name: Deploy Game to Website

# Срабатывать при пуше в ветку main
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Скачиваем код игры
      - name: Checkout Source
        uses: actions/checkout@v4

      # 2. Ставим Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # 3. Устанавливаем зависимости и собираем под iframe сайта
      - name: Install and Build
        run: |
          npm ci
          npm run build:host
        # dist/app.html + dist/assets/* → static/mini-games/flanges-memory-matrix/

      # 4. Отправляем папку dist в репозиторий сайта
      - name: Push to Website Repository
        uses: cpina/github-action-push-to-another-repository@main
        env:
          # GitHub PAT with contents:write on YurMil/cadautoscript.com
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_TOKEN }}
        with:
          source-directory: 'dist'
          destination-github-username: 'YurMil'
          destination-repository-name: 'cadautoscript.com'
          target-directory: 'static/mini-games/flanges-memory-matrix'
          user-email: 'bot@flanges-memory-matrix.local'
          target-branch: main
